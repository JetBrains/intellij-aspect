name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Build all targets
      run: bazel build //... --lockfile_mode=error --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file=/tmp/build_exec.log

    - name: Test all targets
      run: bazel test //... --test_output=errors --//testing/rules:repo_cache=~/.cache/bazel-repo --execution_log_binary_file=/tmp/test_exec.log

    - name: Upload execution logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: execution-logs
        path: |
          /tmp/build_exec.log
          /tmp/test_exec.log

  format-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        repository-cache: true

    - name: Check formatting
      run: bazel run //tools/format:format.check

  license-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check License Header
      uses: apache/skywalking-eyes/header@v0.8.0
      with:
        mode: check
